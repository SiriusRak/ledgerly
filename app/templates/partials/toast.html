{% from "macros/icons.html" import icon %}
<div id="toast" hx-swap-oob="true"
     class="fixed bottom-6 right-6 card shadow-lg px-4 py-3 flex items-center gap-3 text-sm max-w-md animate-fade-in-up z-50" style="box-shadow: var(--shadow-elevated);">
  <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 icon-success">
    {{ icon("check-circle", "w-4 h-4 text-current") }}
  </div>
  <div>
    <p class="font-medium">Batch complete</p>
    {% if paths %}
    <p class="text-xs mt-0.5" style="color: var(--color-text-muted);">{{ paths | length }} file{{ "s" if paths | length > 1 else "" }} stored</p>
    {% endif %}
  </div>
  <button onclick="this.parentElement.remove()" class="ml-auto transition-opacity hover:opacity-70" style="color: var(--color-text-muted);">
    {{ icon("x-circle", "w-4 h-4") }}
  </button>
</div>
